<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>確認画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #f5f5f5;
        }

        .phone {
            max-width: 375px;
            margin: 30px auto;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
        }

        .row-item {
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
            font-size: 14px;
        }

        .label {
            width: 40%;
        }

        .value {
            width: 60%;
            text-align: right;
            word-break: break-all;
        }

        .btn-area {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn-small {
            width: 45%;
        }

        body {
            background-color: #f5f5f5;
            font-size: 13px;
        }

        .mobile-wrapper {
            max-width: 420px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            padding: 1.5rem 1rem;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        #message {
            text-align: right !important;
        }

        .phone {
            font-size: 13px;
        }

        .btn-primary {
            background-color: #E6522A;
            border-color: #E6522A;
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active,
        .btn-primary:focus:active,
        .btn-primary:not(:disabled):not(.disabled):active {
            background-color: #E6522A;
            border-color: #E6522A;
            box-shadow: none;
        }
    </style>
</head>

<body>

    <div class="phone text-center">

        <div class="mb-3">
            <div class="rounded-circle bg-secondary text-white d-inline-flex align-items-center justify-content-center"
                style="width:60px;height:60px;">?</div>
        </div>

        <h4 class="mb-3">以下のページで送信いたしますか？</h4>

        <div class="row-item d-flex">
            <div class="label">お名前</div>
            <div class="value" id="name"></div>
        </div>

        <div class="row-item d-flex">
            <div class="label">メール</div>
            <div class="value" id="email"></div>
        </div>

        <div class="row-item d-flex">
            <div class="label">電話番号</div>
            <div class="value" id="tel"></div>
        </div>

        <div class="row-item d-flex">
            <div class="label">問い合わせ種別</div>
            <div class="value" id="category"></div>
        </div>

        <div class="row-item d-flex">
            <div class="label mb-1">問い合わせ内容</div>
            <div class="value text-start" id="message"></div>
        </div>

        <div class="btn-area">
            <button type="button" class="btn btn-secondary btn-small" onclick="history.back()">戻る</button>
            <button type="button" class="btn btn-primary btn-small"
                onclick="location.href='contact-thanks.html'">送信</button>
        </div>
    </div>

    <script>
        window.addEventListener("load", function () {
            document.getElementById("name").textContent =
                sessionStorage.getItem("name") || "";

            document.getElementById("email").textContent =
                sessionStorage.getItem("email") || "";

            document.getElementById("tel").textContent =
                sessionStorage.getItem("phone") || "";

            const categoryMap = {
                ticket: "チケットについて",
                venue: "会場について",
                people: "出演者について",
                other: "その他"
            };

            const categoryValue = sessionStorage.getItem("category");
            document.getElementById("category").textContent =
                categoryMap[categoryValue] || "";

            document.getElementById("message").textContent =
                sessionStorage.getItem("message") || "";
        });
    </script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
